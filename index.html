<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Chocolate Day, Smriti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #2D1B14;
            font-family: 'Montserrat', sans-serif;
        }
        .font-cursive {
            font-family: 'Dancing Script', cursive;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.1); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }
        .heartbeat {
            animation: heartbeat 1.5s infinite ease-in-out;
        }
        .bg-chocolate-gradient {
            background: linear-gradient(135deg, #4E342E 0%, #3E2723 100%);
        }
        .bg-soft-pink {
            background-color: #F8BBD0;
        }
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<script type="importmap">
